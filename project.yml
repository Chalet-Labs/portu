name: Portu
options:
  bundleIdPrefix: com.portu
  deploymentTarget:
    macOS: "15.0"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  PortuCore:
    path: Packages/PortuCore
  PortuNetwork:
    path: Packages/PortuNetwork
  PortuUI:
    path: Packages/PortuUI
  ComposableArchitecture:
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: "1.25.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  Portu:
    type: application
    platform: macOS
    sources:
      - path: Sources/Portu
        excludes:
          - Resources
    resources:
      - path: Sources/Portu/Resources/Assets.xcassets
    dependencies:
      - package: PortuCore
      - package: PortuNetwork
      - package: PortuUI
      - package: ComposableArchitecture
        product: ComposableArchitecture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.portu.app
        INFOPLIST_FILE: Sources/Portu/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Portu/Resources/Portu.entitlements
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: Sources/Portu/Resources/Portu.entitlements
      properties:
        com.apple.security.network.client: true

  PortuTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/PortuTests
    dependencies:
      - target: Portu
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.portu.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Portu:
    build:
      targets:
        Portu: all
        PortuTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PortuTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
