# SwiftLint configuration for Portu

excluded:
  - .build
  - DerivedData
  - "*.xcodeproj"

disabled_rules:
  - trailing_comma          # Trailing commas improve diffs
  - todo                    # TODOs are intentional during MVP
  - implicit_optional_initialization

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - empty_string
  - fatal_error_message
  - first_where
  - last_where
  - modifier_order
  - overridden_super_call
  - private_action
  - redundant_nil_coalescing
  - sorted_first_last
  - unowned_variable_capture
  - yoda_condition

line_length:
  warning: 150
  error: 300
  ignores_urls: true
  ignores_comments: true

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 4
  error: 6

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 60
  excluded:
    - i
    - j
    - k
    - x
    - y
    - id

nesting:
  type_level: 3
  function_level: 3

statement_position:
  statement_mode: default
